<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flyme Demo - ui-design-father-skill</title>
  <style>
    :root {
      --color-primary: #00B4FF;
      --color-background: #FFFFFF;
      --color-surface: #FAFAFA;
      --color-text-primary: #333333;
      --color-text-secondary: #999999;
      --color-border: #F0F0F0;
      --color-success: #00C853;
      --font-family: 'Flyme Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-size-title: 28px;
      --font-size-subtitle: 18px;
      --font-size-body: 16px;
      --font-size-small: 14px;
      --spacing-xs: 4px;
      --spacing-sm: 8px;
      --spacing-md: 16px;
      --spacing-lg: 24px;
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 2px 8px rgba(0,0,0,0.06);
    }
    [data-theme="dark"] {
      --color-background: #121212;
      --color-surface: #1E1E1E;
      --color-text-primary: #FFFFFF;
      --color-text-secondary: #888888;
      --color-border: #2A2A2A;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-family);
      background: var(--color-background);
      color: var(--color-text-primary);
      min-height: 100vh;
      padding-bottom: 100px;
    }
    /* 导航栏 - 极简 */
    .navbar {
      background: var(--color-background);
      padding: 16px var(--spacing-md);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .navbar-back {
      display: flex;
      align-items: center;
      color: var(--color-text-primary);
      font-size: var(--font-size-body);
      cursor: pointer;
    }
    .navbar-back svg { width: 20px; height: 20px; margin-right: 4px; }
    .navbar-title {
      font-size: var(--font-size-subtitle);
      font-weight: 500;
      flex: 1;
      text-align: center;
    }
    .navbar-actions { display: flex; gap: var(--spacing-sm); }
    .navbar-actions svg { width: 22px; height: 22px; cursor: pointer; fill: var(--color-text-primary); }
    /* 内容区 */
    .content { padding: var(--spacing-md); }
    .page-title {
      font-size: var(--font-size-title);
      font-weight: 700;
      margin-bottom: var(--spacing-lg);
    }
    /* 卡片 - 极简 */
    .card {
      background: var(--color-surface);
      border-radius: var(--radius-md);
      padding: var(--spacing-md);
      margin-bottom: var(--spacing-md);
    }
    .card-title {
      font-size: var(--font-size-body);
      font-weight: 500;
      margin-bottom: var(--spacing-sm);
    }
    .card-text {
      font-size: var(--font-size-small);
      color: var(--color-text-secondary);
      line-height: 1.6;
    }
    /* 按钮 */
    .btn-group { display: flex; gap: var(--spacing-sm); margin-bottom: var(--spacing-md); flex-wrap: wrap; }
    .btn {
      padding: 10px 24px;
      border-radius: var(--radius-sm);
      border: none;
      font-size: var(--font-size-body);
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
      font-family: var(--font-family);
    }
    .btn:active { opacity: 0.7; }
    .btn-primary {
      background: var(--color-primary);
      color: #fff;
    }
    .btn-secondary {
      background: transparent;
      color: var(--color-primary);
      border: 1px solid var(--color-border);
    }
    /* 输入框 */
    .input-group { margin-bottom: var(--spacing-md); }
    .input {
      width: 100%;
      padding: 12px var(--spacing-md);
      border-radius: var(--radius-sm);
      border: 1px solid var(--color-border);
      background: var(--color-surface);
      color: var(--color-text-primary);
      font-size: var(--font-size-body);
      font-family: var(--font-family);
      outline: none;
      transition: border-color 0.2s;
    }
    .input:focus { border-color: var(--color-primary); }
    /* 列表 - 极简 */
    .list { background: var(--color-surface); border-radius: var(--radius-md); overflow: hidden; }
    .list-item {
      display: flex;
      align-items: center;
      padding: 16px var(--spacing-md);
      border-bottom: 1px solid var(--color-border);
      cursor: pointer;
      transition: background 0.2s;
    }
    .list-item:last-child { border-bottom: none; }
    .list-item:hover { background: rgba(0,180,255,0.03); }
    .list-item-content { flex: 1; }
    .list-item-title { font-size: var(--font-size-body); font-weight: 400; }
    .list-item-subtitle { font-size: 12px; color: var(--color-text-secondary); margin-top: 4px; }
    .list-item-arrow { color: var(--color-text-secondary); font-size: 18px; margin-left: var(--spacing-md); }
    /* 标签栏 */
    .tabbar {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 49px;
      background: var(--color-background);
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 100;
      border-top: 1px solid var(--color-border);
    }
    .tabbar-item {
      display: flex; flex-direction: column; align-items: center;
      color: var(--color-text-secondary); font-size: 10px;
      cursor: pointer; padding: 4px 12px;
    }
    .tabbar-item.active { color: var(--color-primary); }
    .tabbar-item svg { width: 20px; height: 20px; margin-bottom: 2px; }
    /* 主题切换 */
    .theme-toggle {
      position: fixed; bottom: 65px; right: var(--spacing-md);
      width: 48px; height: 48px;
      border-radius: 50%;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      box-shadow: var(--shadow-md);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; z-index: 101;
      font-size: 20px;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 19l-7-7 7-7"/></svg>
      返回
    </div>
    <div class="navbar-title">Flyme 风格</div>
    <div class="navbar-actions">
      <svg viewBox="0 0 24 24"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
    </div>
  </nav>
  <main class="content">
    <h1 class="page-title">Flyme</h1>
    <div class="card">
      <div class="card-title">功能卡片</div>
      <div class="card-text">Flyme 风格卡片，极简设计，大面积留白，展示魅族设计语言的克制之美。</div>
    </div>
    <div class="btn-group">
      <button class="btn btn-primary">主要按钮</button>
      <button class="btn btn-secondary">次要按钮</button>
    </div>
    <div class="input-group">
      <input class="input" type="text" placeholder="请输入内容...">
    </div>
    <div class="list">
      <div class="list-item">
        <div class="list-item-content">
          <div class="list-item-title">列表项一</div>
          <div class="list-item-subtitle">描述信息</div>
        </div>
        <div class="list-item-arrow">›</div>
      </div>
      <div class="list-item">
        <div class="list-item-content">
          <div class="list-item-title">列表项二</div>
          <div class="list-item-subtitle">描述信息</div>
        </div>
        <div class="list-item-arrow">›</div>
      </div>
      <div class="list-item">
        <div class="list-item-content">
          <div class="list-item-title">列表项三</div>
          <div class="list-item-subtitle">描述信息</div>
        </div>
        <div class="list-item-arrow">›</div>
      </div>
    </div>
  </main>
  <nav class="tabbar">
    <div class="tabbar-item active">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      首页
    </div>
    <div class="tabbar-item">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
      发现
    </div>
    <div class="tabbar-item">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
      消息
    </div>
    <div class="tabbar-item">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
      我的
    </div>
    <div class="tabbar-item">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L3.16 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.58 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
      设置
    </div>
  </nav>
  <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const current = html.getAttribute('data-theme');
      html.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
    }
  </script>
</body>
</html>
