<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Material Design 3 Demo - ui-design-father-skill</title>
  <style>
    :root {
      --color-primary: #6750A4;
      --color-on-primary: #FFFFFF;
      --color-primary-container: #EADDFF;
      --color-background: #FFFBFE;
      --color-surface: #FFFBFE;
      --color-surface-variant: #E7E0EC;
      --color-text-primary: #1C1B1F;
      --color-text-secondary: #625B71;
      --color-outline: #79747E;
      --color-success: #4CAF50;
      --font-family: 'Roboto', 'Noto Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-size-title: 28px;
      --font-size-subtitle: 18px;
      --font-size-body: 16px;
      --font-size-small: 14px;
      --spacing-xs: 4px;
      --spacing-sm: 8px;
      --spacing-md: 16px;
      --spacing-lg: 24px;
      --radius-sm: 4px;
      --radius-md: 12px;
      --radius-lg: 20px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.12);
      --shadow-md: 0 4px 8px rgba(0,0,0,0.15);
    }
    [data-theme="dark"] {
      --color-primary: #D0BCFF;
      --color-on-primary: #381E72;
      --color-primary-container: #4F378B;
      --color-background: #1C1B1F;
      --color-surface: #1C1B1F;
      --color-surface-variant: #49454F;
      --color-text-primary: #E6E1E5;
      --color-text-secondary: #CAC4D0;
      --color-outline: #938F99;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-family);
      background: var(--color-background);
      color: var(--color-text-primary);
      min-height: 100vh;
      padding-bottom: 100px;
    }
    /* 导航栏 */
    .navbar {
      height: 64px;
      background: var(--color-surface);
      display: flex;
      align-items: center;
      padding: 0 var(--spacing-md);
      box-shadow: var(--shadow-sm);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .navbar-menu { cursor: pointer; margin-right: var(--spacing-md); }
    .navbar-menu svg { width: 24px; height: 24px; fill: var(--color-text-primary); }
    .navbar-title {
      font-size: var(--font-size-subtitle);
      font-weight: 500;
      flex: 1;
    }
    .navbar-actions { display: flex; gap: var(--spacing-sm); }
    .navbar-actions svg { width: 24px; height: 24px; cursor: pointer; fill: var(--color-text-primary); }
    /* 内容区 */
    .content { padding: var(--spacing-md); }
    .page-title {
      font-size: var(--font-size-title);
      font-weight: 400;
      margin-bottom: var(--spacing-lg);
    }
    /* 卡片 */
    .card {
      background: var(--color-surface-variant);
      border-radius: var(--radius-md);
      padding: var(--spacing-md);
      margin-bottom: var(--spacing-md);
    }
    .card-title {
      font-size: var(--font-size-body);
      font-weight: 500;
      margin-bottom: var(--spacing-sm);
    }
    .card-text {
      font-size: var(--font-size-small);
      color: var(--color-text-secondary);
      line-height: 1.5;
    }
    /* 按钮 */
    .btn-group { display: flex; gap: var(--spacing-sm); margin-bottom: var(--spacing-md); flex-wrap: wrap; }
    .btn {
      padding: 10px 24px;
      border-radius: var(--radius-lg);
      border: none;
      font-size: var(--font-size-body);
      font-weight: 500;
      cursor: pointer;
      transition: box-shadow 0.2s, transform 0.1s;
      font-family: var(--font-family);
      letter-spacing: 0.5px;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary {
      background: var(--color-primary);
      color: var(--color-on-primary);
    }
    .btn-secondary {
      background: transparent;
      color: var(--color-primary);
      border: 1px solid var(--color-outline);
    }
    /* 输入框 */
    .input-group { margin-bottom: var(--spacing-md); }
    .input {
      width: 100%;
      padding: 12px var(--spacing-md);
      border-radius: var(--radius-sm);
      border: 1px solid var(--color-outline);
      background: var(--color-surface);
      color: var(--color-text-primary);
      font-size: var(--font-size-body);
      font-family: var(--font-family);
      outline: none;
      transition: border-color 0.2s;
    }
    .input:focus { border-color: var(--color-primary); border-width: 2px; }
    /* 列表 */
    .list { background: var(--color-surface-variant); border-radius: var(--radius-md); overflow: hidden; }
    .list-item {
      display: flex;
      align-items: center;
      padding: 14px var(--spacing-md);
      border-bottom: 1px solid var(--color-outline);
      cursor: pointer;
      transition: background 0.2s;
    }
    .list-item:last-child { border-bottom: none; }
    .list-item:hover { background: rgba(103,80,164,0.05); }
    .list-item-icon {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--color-primary-container);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: var(--spacing-md);
      color: var(--color-primary);
      font-size: 18px;
      font-weight: 500;
    }
    .list-item-content { flex: 1; }
    .list-item-title { font-size: var(--font-size-body); font-weight: 500; }
    .list-item-subtitle { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; }
    /* FAB */
    .fab {
      position: fixed;
      bottom: 90px;
      right: var(--spacing-md);
      width: 56px; height: 56px;
      border-radius: 16px;
      background: var(--color-primary-container);
      color: var(--color-primary);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: var(--shadow-md);
      font-size: 24px;
      z-index: 101;
    }
    /* 标签栏 */
    .tabbar {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 80px;
      background: var(--color-surface);
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 100;
      padding-bottom: 8px;
    }
    .tabbar-item {
      display: flex; flex-direction: column; align-items: center;
      color: var(--color-text-secondary); font-size: 12px;
      cursor: pointer; padding: 4px 16px;
      position: relative;
    }
    .tabbar-item.active { color: var(--color-primary); }
    .tabbar-item svg { width: 24px; height: 24px; margin-bottom: 4px; }
    .tabbar-indicator {
      position: absolute;
      bottom: 0;
      width: 40px;
      height: 4px;
      background: var(--color-primary);
      border-radius: 2px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .tabbar-item.active .tabbar-indicator { opacity: 1; }
    /* 主题切换 */
    .theme-toggle {
      position: fixed; bottom: 150px; right: var(--spacing-md);
      width: 48px; height: 48px;
      border-radius: 50%;
      background: var(--color-surface-variant);
      border: 1px solid var(--color-outline);
      box-shadow: var(--shadow-md);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; z-index: 101;
      font-size: 20px;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-menu">
      <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
    </div>
    <div class="navbar-title">Material Design 3</div>
    <div class="navbar-actions">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
    </div>
  </nav>
  <main class="content">
    <h1 class="page-title">Material Design 3</h1>
    <div class="card">
      <div class="card-title">功能卡片</div>
      <div class="card-text">Material Design 3 卡片组件，采用大圆角和柔和阴影，展示 Material You 设计语言的典型特征。</div>
    </div>
    <div class="btn-group">
      <button class="btn btn-primary">主要按钮</button>
      <button class="btn btn-secondary">次要按钮</button>
    </div>
    <div class="input-group">
      <input class="input" type="text" placeholder="请输入内容...">
    </div>
    <div class="list">
      <div class="list-item">
        <div class="list-item-icon">A</div>
        <div class="list-item-content">
          <div class="list-item-title">列表项一</div>
          <div class="list-item-subtitle">描述信息</div>
        </div>
      </div>
      <div class="list-item">
        <div class="list-item-icon">B</div>
        <div class="list-item-content">
          <div class="list-item-title">列表项二</div>
          <div class="list-item-subtitle">描述信息</div>
        </div>
      </div>
      <div class="list-item">
        <div class="list-item-icon">C</div>
        <div class="list-item-content">
          <div class="list-item-title">列表项三</div>
          <div class="list-item-subtitle">描述信息</div>
        </div>
      </div>
    </div>
  </main>
  <button class="fab">+</button>
  <nav class="tabbar">
    <div class="tabbar-item active">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      首页
      <div class="tabbar-indicator"></div>
    </div>
    <div class="tabbar-item">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
      发现
      <div class="tabbar-indicator"></div>
    </div>
    <div class="tabbar-item">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
      消息
      <div class="tabbar-indicator"></div>
    </div>
    <div class="tabbar-item">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
      我的
      <div class="tabbar-indicator"></div>
    </div>
    <div class="tabbar-item">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L3.16 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.58 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
      设置
      <div class="tabbar-indicator"></div>
    </div>
  </nav>
  <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const current = html.getAttribute('data-theme');
      html.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
    }
  </script>
</body>
</html>
